<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
 
<!--
  ============================================================
  HOW TO EDIT THIS PORTFOLIO
  ============================================================
  1. Your content (name, links, projects, skills, education)
     lives in script.js — open that file and edit the DATA
     object near the top.
  2. Colors, fonts, spacing live in style.css — you shouldn't
     need to touch this unless you want to change the look.
  3. This file (index.html) is just the skeleton/structure —
     you almost never need to edit it.
  ============================================================
-->
 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
 
<nav>
  <div class="wrap">
    <div class="navname" id="nav-name">Your Name</div>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>
 
<header class="hero">
  <div class="wrap">
    <div class="eyebrow mono" id="hero-eyebrow">Fresh Graduate · Open to work</div>
    <h1 class="name" id="hero-name">Your Name</h1>
    <p class="role" id="hero-role">Your role / tagline goes here.</p>
    <div class="hero-links" id="hero-links"></div>
  </div>
</header>
 
<section id="about">
  <div class="wrap">
    <div class="section-head"><span class="mono">01</span><h2>About</h2></div>
    <p class="about-text" id="about-text"></p>
  </div>
</section>
 
<section id="skills">
  <div class="wrap">
    <div class="section-head"><span class="mono">02</span><h2>Skills</h2></div>
    <div class="skill-groups" id="skill-groups"></div>
  </div>
</section>
 
<section id="projects">
  <div class="wrap">
    <div class="section-head"><span class="mono">03</span><h2>Projects</h2></div>
    <div id="projects-list"></div>
  </div>
</section>
 
<section id="education">
  <div class="wrap">
    <div class="section-head"><span class="mono">04</span><h2>Education & Experience</h2></div>
    <div id="timeline-list"></div>
  </div>
</section>
 
<footer id="contact">
  <div class="wrap">
    <h2>Let's talk</h2>
    <p id="contact-line">Open to opportunities — reach out any time.</p>
    <div class="hero-links" id="contact-links"></div>
    <div class="copyright" id="copyright"></div>
  </div>
</footer>
 
<script src="script.js"></script>
</body>
</html>
